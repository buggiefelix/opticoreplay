<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Opticore Play</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="config.js"></script>
  <script src="script.js" defer></script>
  <script src="dashboard.js" defer></script>
</head>
<body data-page="dashboard" data-protected="true" data-nav="home">
  <div class="page-shell dashboard-shell">
    <header class="app-topbar dashboard-topbar">
      <a class="brand-lockup dashboard-brand-lockup" href="dashboard.html">
        <span class="dashboard-brand-mark">
          <img class="brand-logo dashboard-brand-logo" src="a_professional_logo_design_for_opticore_play_is.png" alt="Opticore Play logo">
        </span>
        <div class="brand-copy dashboard-brand-copy">
          <strong>Opticore Play</strong>
          <span>Game lobby and wallet center</span>
        </div>
      </a>
      <div class="topbar-actions dashboard-topbar-actions">
        <span class="info-pill dashboard-balance-pill">Balance <strong class="dashboard-balance-value dashboard-balance-loading" data-balance aria-busy="true">Loading</strong></span>
        <a class="btn btn-secondary dashboard-wallet-btn" href="wallet.html">Wallet</a>
      </div>
    </header>

    <main class="dashboard-stage">
      <section class="panel dashboard-lobby-panel">
        <div class="dashboard-lobby-head">
          <div class="dashboard-lobby-copy">
            <span class="eyebrow dashboard-tag">Lobby</span>
            <h1 id="dashboardWelcome" class="dashboard-headline"><span class="dashboard-headline-user">Player</span></h1>
            <p class="panel-copy dashboard-lead">Choose a game.</p>
          </div>
          <div class="dashboard-lobby-actions">
            <span class="dashboard-meta-pill">4 live tables</span>
            <a class="btn btn-secondary dashboard-all-games-btn" href="games.html">All Games</a>
          </div>
        </div>
        <div id="dashboardGames" class="dashboard-games-grid"></div>
      </section>
    </main>
  </div>

  <nav class="nav-bar dashboard-nav-bar">
    <a class="nav-link" data-nav-link="home" href="dashboard.html"><span class="nav-dot"></span><span>Home</span></a>
    <a class="nav-link" data-nav-link="wallet" href="wallet.html"><span class="nav-dot"></span><span>Wallet</span></a>
    <a class="nav-link" data-nav-link="friends" href="friends.html"><span class="nav-dot"></span><span>Friends</span></a>
    <a class="nav-link" data-nav-link="tournaments" href="tournaments.html"><span class="nav-dot"></span><span>Tourneys</span></a>
    <a class="nav-link" data-nav-link="leaderboard" href="leaderboard.html"><span class="nav-dot"></span><span>Leaders</span></a>
    <a class="nav-link" data-nav-link="profile" href="profile.html"><span class="nav-dot"></span><span>Profile</span></a>
  </nav>
</body>
</html>

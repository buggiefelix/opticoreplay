<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Opticore Play</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="script.js" defer></script>
</head>
<body data-page="profile" data-protected="true" data-nav="profile">
  <div class="page-shell">
    <header class="app-topbar">
      <a class="brand-lockup" href="dashboard.html">
        <img class="brand-logo" src="a_professional_logo_design_for_opticore_play_is.png" alt="Opticore Play logo">
        <div class="brand-copy">
          <strong>Opticore Play</strong>
          <span>Profile and match history</span>
        </div>
      </a>
      <div class="topbar-actions">
        <span class="info-pill">Balance <strong data-balance>N0</strong></span>
        <button id="logoutButton" class="btn btn-ghost" type="button">Logout</button>
      </div>
    </header>

    <section class="profile-grid" style="margin-top: 22px;">
      <section class="panel">
        <span class="eyebrow">Player card</span>
        <div id="profileCard" style="margin-top: 18px;"></div>
      </section>

      <section class="panel">
        <span class="eyebrow">Career focus</span>
        <h2 class="panel-title">What to improve next</h2>
        <div id="profileNotes" class="note-list" style="margin-top: 18px;"></div>
      </section>
    </section>

    <section class="panel" style="margin-top: 22px;">
      <span class="eyebrow">History</span>
      <h2 class="panel-title">Recent matches and tournament entries</h2>
      <div id="profileHistory" class="history-list" style="margin-top: 18px;"></div>
    </section>
  </div>

  <nav class="nav-bar">
    <a class="nav-link" data-nav-link="home" href="dashboard.html"><span class="nav-dot"></span><span>Home</span></a>
    <a class="nav-link" data-nav-link="wallet" href="wallet.html"><span class="nav-dot"></span><span>Wallet</span></a>
    <a class="nav-link" data-nav-link="friends" href="friends.html"><span class="nav-dot"></span><span>Friends</span></a>
    <a class="nav-link" data-nav-link="tournaments" href="tournaments.html"><span class="nav-dot"></span><span>Tourneys</span></a>
    <a class="nav-link" data-nav-link="leaderboard" href="leaderboard.html"><span class="nav-dot"></span><span>Leaders</span></a>
    <a class="nav-link" data-nav-link="profile" href="profile.html"><span class="nav-dot"></span><span>Profile</span></a>
  </nav>
</body>
</html>

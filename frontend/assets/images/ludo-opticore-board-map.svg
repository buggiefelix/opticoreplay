<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Opticore Play Ludo Board</title>
  <desc id="desc">A wooden framed Ludo board with yellow, green, blue, and red home zones branded for Opticore Play.</desc>
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8a72f"/>
      <stop offset="0.25" stop-color="#f1bf54"/>
      <stop offset="0.55" stop-color="#c48225"/>
      <stop offset="1" stop-color="#f0b949"/>
    </linearGradient>
    <linearGradient id="yellowZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9e329"/>
      <stop offset="1" stop-color="#edd51d"/>
    </linearGradient>
    <linearGradient id="greenZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20c74e"/>
      <stop offset="1" stop-color="#16ab3f"/>
    </linearGradient>
    <linearGradient id="blueZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f92ea"/>
      <stop offset="1" stop-color="#2674ca"/>
    </linearGradient>
    <linearGradient id="redZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef583d"/>
      <stop offset="1" stop-color="#d24830"/>
    </linearGradient>
    <linearGradient id="innerYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0b72b"/>
      <stop offset="1" stop-color="#978c18"/>
    </linearGradient>
    <linearGradient id="innerGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b8b27"/>
      <stop offset="1" stop-color="#096f1f"/>
    </linearGradient>
    <linearGradient id="innerBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#257dd3"/>
      <stop offset="1" stop-color="#155aa8"/>
    </linearGradient>
    <linearGradient id="innerRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d34f36"/>
      <stop offset="1" stop-color="#b93d29"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <symbol id="arrowRight" viewBox="0 0 100 100">
      <path d="M8 50h60l-12-12 8-8 28 20-28 20-8-8 12-12H8z" fill="#303030"/>
    </symbol>
    <pattern id="crossHatch" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <path d="M0 14H28" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>
      <path d="M14 0V28" stroke="#000000" stroke-opacity="0.05" stroke-width="2"/>
    </pattern>
    <pattern id="leafPattern" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M10 40c18-28 36-28 54 0-18 10-36 10-54 0z" fill="#ffffff" fill-opacity="0.05"/>
      <path d="M58 18c18-28 36-28 54 0-18 10-36 10-54 0z" fill="#ffffff" fill-opacity="0.04"/>
      <path d="M44 78c18-28 36-28 54 0-18 10-36 10-54 0z" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="url(#wood)"/>
  <rect x="54" y="54" width="1092" height="1092" rx="4" fill="#ffffff"/>
  <rect x="75" y="75" width="1050" height="1050" fill="#f6f6f6" stroke="#0f0f0f" stroke-width="6"/>

  <g stroke="#171717" stroke-width="3">
    <path d="M145 75V1125M215 75V1125M285 75V1125M355 75V1125M425 75V1125M495 75V1125M565 75V1125M635 75V1125M705 75V1125M775 75V1125M845 75V1125M915 75V1125M985 75V1125M1055 75V1125"/>
    <path d="M75 145H1125M75 215H1125M75 285H1125M75 355H1125M75 425H1125M75 495H1125M75 565H1125M75 635H1125M75 705H1125M75 775H1125M75 845H1125M75 915H1125M75 985H1125M75 1055H1125"/>
  </g>

  <g stroke="#121212" stroke-width="5">
    <rect x="75" y="75" width="420" height="420" fill="url(#yellowZone)"/>
    <rect x="705" y="75" width="420" height="420" fill="url(#greenZone)"/>
    <rect x="75" y="705" width="420" height="420" fill="url(#blueZone)"/>
    <rect x="705" y="705" width="420" height="420" fill="url(#redZone)"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="104" y="104" width="362" height="362" fill="url(#innerYellow)" stroke="#e9df5f" stroke-width="4"/>
    <rect x="104" y="104" width="362" height="362" fill="url(#crossHatch)" opacity="0.55"/>
    <rect x="734" y="104" width="362" height="362" fill="url(#innerGreen)" stroke="#5be26d" stroke-width="4"/>
    <rect x="734" y="104" width="362" height="362" fill="url(#leafPattern)" opacity="0.6"/>
    <rect x="104" y="734" width="362" height="362" fill="url(#innerBlue)" stroke="#75b8ff" stroke-width="4"/>
    <rect x="104" y="734" width="362" height="362" fill="url(#crossHatch)" opacity="0.4"/>
    <rect x="734" y="734" width="362" height="362" fill="url(#innerRed)" stroke="#ff866c" stroke-width="4"/>
    <rect x="734" y="734" width="362" height="362" fill="url(#crossHatch)" opacity="0.4"/>
  </g>

  <g fill="#2bb94a">
    <rect x="565" y="145" width="70" height="350"/>
    <rect x="635" y="145" width="70" height="70"/>
  </g>
  <g fill="#e04c38">
    <rect x="705" y="565" width="350" height="70"/>
    <rect x="985" y="635" width="70" height="70"/>
  </g>
  <g fill="#2f71bc">
    <rect x="565" y="705" width="70" height="350"/>
    <rect x="565" y="985" width="70" height="70"/>
  </g>
  <g fill="#f6dc24">
    <rect x="145" y="565" width="350" height="70"/>
    <rect x="145" y="495" width="70" height="70"/>
  </g>

  <g fill="#f1f1f1" stroke="#111111" stroke-width="5" filter="url(#softShadow)">
    <rect x="489" y="489" width="222" height="222" fill="#ffcb5d"/>
    <rect x="499" y="499" width="202" height="202" fill="#f25834"/>
    <rect x="531" y="531" width="138" height="138" fill="#243106"/>
    <rect x="557" y="557" width="86" height="86" fill="#f7f7f7"/>
  </g>

  <g fill="#303030">
    <use href="#arrowRight" x="82" y="558" width="56" height="56"/>
    <use href="#arrowRight" x="175" y="488" width="56" height="56"/>
    <use href="#arrowRight" x="588" y="82" width="56" height="56" transform="rotate(90 616 110)"/>
    <use href="#arrowRight" x="658" y="222" width="56" height="56" transform="rotate(90 686 250)"/>
    <use href="#arrowRight" x="1062" y="558" width="56" height="56" transform="rotate(180 1090 586)"/>
    <use href="#arrowRight" x="852" y="628" width="56" height="56" transform="rotate(180 880 656)"/>
    <use href="#arrowRight" x="588" y="1062" width="56" height="56" transform="rotate(270 616 1090)"/>
    <use href="#arrowRight" x="448" y="838" width="56" height="56" transform="rotate(225 476 866)"/>
    <use href="#arrowRight" x="448" y="418" width="56" height="56" transform="rotate(315 476 446)"/>
    <use href="#arrowRight" x="728" y="418" width="56" height="56" transform="rotate(45 756 446)"/>
    <use href="#arrowRight" x="728" y="698" width="56" height="56" transform="rotate(135 756 726)"/>
    <use href="#arrowRight" x="448" y="698" width="56" height="56" transform="rotate(225 476 726)"/>
  </g>

  <g fill="#e3c95e" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-weight="700" text-anchor="middle" opacity="0.45">
    <text x="285" y="285" font-size="70" transform="rotate(90 285 285)">OPTICORE</text>
    <text x="285" y="385" font-size="70" transform="rotate(90 285 385)">PLAY</text>
    <text x="915" y="285" font-size="70" transform="rotate(180 915 285)">OPTICORE</text>
    <text x="915" y="385" font-size="70" transform="rotate(180 915 385)">PLAY</text>
    <text x="285" y="915" font-size="72">OPTICORE</text>
    <text x="285" y="995" font-size="72">PLAY</text>
    <text x="915" y="900" font-size="72" transform="rotate(-90 915 900)">OPTICORE</text>
    <text x="1010" y="900" font-size="72" transform="rotate(-90 1010 900)">PLAY</text>
  </g>
</svg>

services:
  - type: web
    name: opticoreplay-backend
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: opticoreplay
      - key: MONGODB_COLLECTION
        value: app_store
      - key: MONGODB_DOCUMENT_ID
        value: primary
      - key: CORS_ORIGIN
        sync: false
